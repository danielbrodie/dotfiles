# tmux Configuration

# ---------------------------------------------------------
# Shell
# ---------------------------------------------------------
set -g default-shell /opt/homebrew/bin/fish

# ---------------------------------------------------------
# True color support (critical for Ghostty + themes)
# ---------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# ---------------------------------------------------------
# Prefix: Ctrl-a (closer to home row than Ctrl-b)
# ---------------------------------------------------------
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ---------------------------------------------------------
# Indexing: start at 1, renumber on close
# ---------------------------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ---------------------------------------------------------
# Mouse
# ---------------------------------------------------------
set -g mouse on

# ---------------------------------------------------------
# Vi mode for copy/scroll
# ---------------------------------------------------------
setw -g mode-keys vi

# Copy to system clipboard (macOS)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ---------------------------------------------------------
# Splits: | and - , open in current path
# ---------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ---------------------------------------------------------
# Pane navigation (vim-style)
# ---------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---------------------------------------------------------
# Pane resizing (repeatable with -r)
# ---------------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------------------------------------------------------
# Quality of life
# ---------------------------------------------------------
set -sg escape-time 0
set -g history-limit 50000

# Activity alerts
setw -g monitor-activity on
set -g visual-activity off

# Don't rename windows automatically
set -g allow-rename off

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ---------------------------------------------------------
# Status bar
# ---------------------------------------------------------
set -g status-position bottom
set -g status-interval 5

# ---------------------------------------------------------
# Plugins (TPM)
# ---------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'catppuccin/tmux'

# Catppuccin options
set -g @catppuccin_flavor 'mocha'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
